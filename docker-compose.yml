# Hai container cùng image / .env / DB, chạy song song:
#   bot            → python bot.py           (KETOAN_TOKEN — bot nhóm)
#   tong_ket_bot   → python tong_ket_bot.py  (TONG_KET_TOAN_TOKEN — bot tổng kết)
#
# `docker compose up -d` bật cả hai. Thiếu TONG_KET_TOAN_TOKEN thì process tổng kết chờ (không restart vòng).
#
# network_mode: host — DB_HOST=localhost = PostgreSQL trên máy host (Linux).

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    command: python bot.py

  tong_ket_bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    command: python tong_ket_bot.py
